<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Asia Trip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage: #9db89a;
      --sage-light: #c8dbc5;
      --beige: #f5ede0;
      --beige-dark: #e8d9c5;
      --sky: #a8c8e8;
      --sky-light: #d4e8f5;
      --lavender: #c4b5d4;
      --lavender-light: #e8e0f0;
      --peach: #f2c4a8;
      --warm-white: #fdf8f2;
      --card-bg: #fffdf8;
      --text-main: #4a3f35;
      --text-muted: #8a7a6e;
      --text-light: #b8a898;
      --badge-reserve: #f4b8b8;
      --badge-reserve-text: #c46060;
      --badge-rec: #f8e0a0;
      --badge-rec-text: #a07820;
      --badge-free: #b8ddb8;
      --badge-free-text: #4a8a4a;
      --nav-active: #9d88c8;
      --timeline-dot: #c4b5d4;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --shadow-soft: 0 4px 20px rgba(100,80,60,0.08);
      --shadow-card: 0 2px 12px rgba(100,80,60,0.07);
    }

    html, body {
      font-family: 'Nunito', sans-serif;
      background: var(--beige);
      color: var(--text-main);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: hidden;
    }

    .app-shell {
      width: 100%;
      max-width: 420px;
      min-height: 100dvh;
      background: var(--warm-white);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    .header {
      position: relative;
      background: linear-gradient(160deg, #c8dde8 0%, #d4c8e8 30%, #e8d4c0 65%, #f5e4ce 100%);
      padding: 0;
      overflow: hidden;
      min-height: 240px;
      flex-shrink: 0;
    }

    .header-sky {
      position: absolute; inset: 0;
      background: linear-gradient(175deg, #b8d8f0 0%, #ccd8e8 25%, #ddd0e0 50%, #eedac8 75%, #f5e4cc 100%);
    }

    /* Cherry blossom petals */
    .petals {
      position: absolute; inset: 0; pointer-events: none;
      overflow: hidden;
    }
    .petal {
      position: absolute;
      width: 8px; height: 8px;
      background: radial-gradient(ellipse, #f9d0d8 30%, #f4b8c4 100%);
      border-radius: 50% 0 50% 0;
      opacity: 0.7;
      animation: petalFloat linear infinite;
    }
    @keyframes petalFloat {
      0%   { transform: translateY(-10px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(280px) rotate(360deg) translateX(30px); opacity: 0; }
    }

    /* Trees in bg */
    .header-bg-trees {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: none;
    }

    .header-content {
      position: relative;
      z-index: 2;
      padding: 52px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .header-top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
    }

    .icon-btn {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.7); transform: scale(1.05); }
    .icon-btn:active { transform: scale(0.95); }

    .header-title-area {
      position: absolute;
      bottom: 20px; left: 20px;
      z-index: 5;
    }

    .trip-title {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 12px rgba(100,70,50,0.25);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    .trip-title .paw {
      font-size: 22px;
      display: inline-block;
      animation: pawBounce 3s ease-in-out infinite;
    }
    @keyframes pawBounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-3px) rotate(10deg); }
    }

    .trip-dates {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 6px rgba(100,70,50,0.2);
      margin-top: 2px;
    }

    .header-tagline {
      position: absolute;
      bottom: 56px; left: 20px;
      z-index: 5;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-main);
      display: flex; align-items: center; gap: 4px;
    }

    /* Cat SVG */
    .cat-hero {
      position: absolute;
      right: -8px;
      bottom: 0;
      z-index: 4;
      width: 175px;
      animation: catIdle 4s ease-in-out infinite;
      transform-origin: bottom center;
    }
    @keyframes catIdle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .speech-bubble {
      position: absolute;
      right: 148px; bottom: 108px;
      z-index: 6;
      background: white;
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      font-size: 18px;
      animation: bubblePop 3s ease-in-out infinite;
    }
    @keyframes bubblePop {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    /* ─── DAY SELECTOR ───────────────────────────────── */
    .day-selector-wrap {
      background: var(--warm-white);
      padding: 16px 0 12px;
      flex-shrink: 0;
    }

    .day-selector {
      display: flex;
      gap: 10px;
      padding: 0 16px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .day-selector::-webkit-scrollbar { display: none; }

    .day-pill {
      flex-shrink: 0;
      scroll-snap-align: start;
      background: var(--warm-white);
      border: 1.5px solid var(--beige-dark);
      border-radius: var(--radius-lg);
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      min-width: 90px;
      text-align: center;
      position: relative;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }

    .day-pill:hover { transform: translateY(-2px); box-shadow: var(--shadow-card); }
    .day-pill:active { transform: scale(0.96); }

    .day-pill.active {
      background: var(--lavender-light);
      border-color: var(--lavender);
      box-shadow: 0 4px 16px rgba(160,140,200,0.2);
    }
    .day-pill.active::after {
      content: '';
      position: absolute;
      bottom: -14px; left: 50%;
      transform: translateX(-50%);
      width: 6px; height: 6px;
      background: var(--nav-active);
      border-radius: 50%;
    }

    .day-pill-icon {
      font-size: 18px;
      line-height: 1;
    }

    .day-pill-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .day-pill.active .day-pill-label { color: var(--nav-active); }

    .day-pill-city {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-main);
    }

    .day-pill-date {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-light);
    }

    .day-scroll-btn {
      flex-shrink: 0;
      width: 36px; height: 36px;
      background: var(--lavender-light);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      align-self: center;
      color: var(--nav-active);
      font-size: 18px;
      transition: background 0.2s, transform 0.15s;
    }
    .day-scroll-btn:hover { background: var(--lavender); transform: scale(1.05); }

    /* ─── TIMELINE / ACTIVITIES ──────────────────────── */
    .timeline-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 100px;
      scrollbar-width: thin;
      scrollbar-color: var(--beige-dark) transparent;
    }

    .timeline {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .timeline-line {
      position: absolute;
      left: 38px;
      top: 16px; bottom: 16px;
      width: 2px;
      background: linear-gradient(to bottom, var(--lavender), var(--sky-light), var(--sage-light));
      border-radius: 2px;
    }

    .activity-row {
      display: flex;
      gap: 0;
      align-items: flex-start;
      padding-bottom: 20px;
      position: relative;
    }

    .time-col {
      width: 56px;
      flex-shrink: 0;
      padding-top: 18px;
      text-align: right;
      padding-right: 12px;
      position: relative;
    }

    .time-text {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      line-height: 1;
    }

    .timeline-dot {
      position: absolute;
      right: -5px; top: 20px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--lavender);
      border: 2px solid var(--warm-white);
      box-shadow: 0 0 0 2px var(--lavender);
      z-index: 2;
    }

    .activity-card {
      flex: 1;
      background: var(--card-bg);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      border: 1px solid rgba(200,180,160,0.15);
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      cursor: pointer;
    }
    .activity-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-soft); }
    .activity-card:active { transform: scale(0.98); }

    .activity-card.done-card {
      opacity: 0.6;
    }
    .activity-card.done-card .activity-name {
      text-decoration: line-through;
    }

    .card-top {
      display: flex;
      gap: 0;
    }

    .card-thumb {
      width: 90px;
      flex-shrink: 0;
      background: var(--beige-dark);
      position: relative;
      overflow: hidden;
    }

    .card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .card-thumb-placeholder {
      width: 100%; height: 100%;
      min-height: 100px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      background: linear-gradient(135deg, var(--beige-dark) 0%, var(--sky-light) 100%);
    }

    .card-body {
      flex: 1;
      padding: 12px 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .activity-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.3;
      flex: 1;
    }

    .card-category {
      font-size: 16px;
      flex-shrink: 0;
    }

    .activity-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px 10px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .badge-reserve { background: var(--badge-reserve); color: var(--badge-reserve-text); }
    .badge-rec     { background: var(--badge-rec);     color: var(--badge-rec-text); }
    .badge-free    { background: var(--badge-free);    color: var(--badge-free-text); }

    .btn-map {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 20px;
      border: none;
      background: var(--lavender-light);
      color: var(--nav-active);
      font-size: 11px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-left: auto;
    }
    .btn-map:hover { background: var(--lavender); transform: scale(1.03); }
    .btn-map:active { transform: scale(0.97); }

    .btn-bookmark {
      width: 30px; height: 30px;
      border: 1.5px solid var(--beige-dark);
      background: var(--warm-white);
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    .btn-bookmark:hover { background: var(--lavender-light); border-color: var(--lavender); }
    .btn-bookmark.saved { background: var(--lavender-light); border-color: var(--lavender); }
    .btn-bookmark:active { transform: scale(0.9); }

    .done-toggle {
      position: absolute;
      top: 12px; right: 12px;
      width: 22px; height: 22px;
      border: 2px solid var(--beige-dark);
      border-radius: 7px;
      background: var(--warm-white);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      transition: all 0.2s;
      flex-shrink: 0;
      z-index: 3;
    }
    .done-toggle.checked {
      background: var(--sage-light);
      border-color: var(--sage);
    }
    .done-toggle:hover { border-color: var(--sage); }
    .done-toggle:active { transform: scale(0.85); }

    .card-relative-wrap {
      position: relative;
      flex: 1;
    }

    /* ─── DAY DIVIDER ────────────────────────────────── */
    .day-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 0 16px 0;
    }
    .day-header-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--lavender);
      border: 3px solid var(--warm-white);
      box-shadow: 0 0 0 2px var(--lavender);
      flex-shrink: 0;
      margin-left: 31px;
    }
    .day-header-label {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-main);
    }
    .day-header-sub {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-light);
      margin-left: 2px;
    }

    /* ─── BOTTOM BAR ─────────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      background: rgba(253,248,242,0.92);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(200,180,160,0.2);
      display: flex;
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      z-index: 100;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      padding: 4px 0;
      transition: transform 0.2s;
    }
    .nav-item:active { transform: scale(0.9); }

    .nav-icon {
      font-size: 22px;
      line-height: 1;
      transition: transform 0.2s;
    }
    .nav-item.active .nav-icon { transform: scale(1.15); }

    .nav-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-light);
      font-family: 'Nunito', sans-serif;
    }
    .nav-item.active .nav-label { color: var(--nav-active); }

    .nav-active-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: var(--nav-active);
      border-radius: 2px 2px 0 0;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* ─── FOOTER CAT ─────────────────────────────────── */
    .footer-cat-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--beige);
      border-top: 1px solid var(--beige-dark);
    }

    .footer-cat-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--beige-dark);
      border: 2px solid var(--peach);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(200,140,100,0.15);
    }

    .footer-cat-text {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .footer-paw {
      font-size: 20px;
      opacity: 0.5;
    }

    /* ─── LOADING OVERLAY ────────────────────────────── */
    .day-transition {
      animation: fadeSlide 0.35s ease;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── MAP TOAST ──────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text-main);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 20px;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── SCROLLBAR ──────────────────────────────────── */
    .timeline-wrap::-webkit-scrollbar { width: 4px; }
    .timeline-wrap::-webkit-scrollbar-track { background: transparent; }
    .timeline-wrap::-webkit-scrollbar-thumb { background: var(--beige-dark); border-radius: 4px; }

    /* ─── BG DECORATIVE ──────────────────────────────── */
    .bg-petal-left, .bg-petal-right {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0.25;
      font-size: 40px;
    }
    .bg-petal-left { left: -10px; top: 40%; }
    .bg-petal-right { right: -10px; top: 60%; }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- HEADER -->
  <header class="header">
    <div class="header-sky"></div>

    <!-- Floating petals -->
    <div class="petals" id="petals"></div>

    <!-- Background mountain/tree SVG -->
    <svg class="header-bg-trees" viewBox="0 0 420 120" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg" style="opacity:0.35;">
      <!-- Mountains -->
      <ellipse cx="60" cy="120" rx="80" ry="60" fill="#b8c8d8"/>
      <ellipse cx="180" cy="120" rx="100" ry="70" fill="#c8d4e0"/>
      <ellipse cx="340" cy="120" rx="90" ry="55" fill="#b0c0d0"/>
      <!-- Ground -->
      <rect x="0" y="105" width="420" height="20" fill="#c8d8a8" opacity="0.6"/>
      <!-- Trees left -->
      <rect x="20" y="75" width="6" height="35" rx="3" fill="#8aaa78"/>
      <ellipse cx="23" cy="70" rx="14" ry="18" fill="#a8c890"/>
      <ellipse cx="23" cy="62" rx="10" ry="14" fill="#b8d8a0"/>
      <!-- Trees right -->
      <rect x="370" y="80" width="6" height="30" rx="3" fill="#8aaa78"/>
      <ellipse cx="373" cy="74" rx="12" ry="16" fill="#a8c890"/>
      <!-- Cherry trees -->
      <rect x="120" y="78" width="5" height="28" rx="2.5" fill="#c0a090"/>
      <ellipse cx="122" cy="68" rx="16" ry="20" fill="#f4c8d0" opacity="0.8"/>
      <ellipse cx="122" cy="60" rx="12" ry="16" fill="#f8d8e0" opacity="0.7"/>
      <rect x="280" y="78" width="5" height="28" rx="2.5" fill="#c0a090"/>
      <ellipse cx="282" cy="68" rx="14" ry="18" fill="#f4c8d0" opacity="0.8"/>
      <!-- Building silhouette -->
      <rect x="180" y="55" width="8" height="20" fill="#a0b8c8" opacity="0.5" rx="1"/>
      <polygon points="176,55 192,55 184,44" fill="#a0b8c8" opacity="0.5"/>
    </svg>

    <!-- Top bar -->
    <div class="header-top-bar">
      <button class="icon-btn" aria-label="Menú">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <rect width="16" height="2" rx="1" fill="#4a3f35"/>
          <rect y="5" width="11" height="2" rx="1" fill="#4a3f35"/>
          <rect y="10" width="14" height="2" rx="1" fill="#4a3f35"/>
        </svg>
      </button>
      <button class="icon-btn" aria-label="Equipaje">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">

const statusMap = {
  reserve: { cls: "badge-reserve", icon: "🔴", label: "Reservar" },
  rec:     { cls: "badge-rec",     icon: "⭐", label: "Recomendado" },
  free:    { cls: "badge-free",    icon: "🟢", label: "Libre" }
};

/* ── STATE ─────────────────────────────────────────────── */
let currentDay = 0;
const doneState = JSON.parse(localStorage.getItem('asia-done') || '{}');
const savedState = JSON.parse(localStorage.getItem('asia-saved') || '{}');

/* ── RENDER ─────────────────────────────────────────────── */
function renderDay(dayIdx) {
  const timeline = document.getElementById('timeline');
  const day = DAYS[dayIdx];
  timeline.innerHTML = '';

  // Day header
  const header = document.createElement('div');
  header.className = 'day-header';
  header.innerHTML = `
    <div class="day-header-dot"></div>
    <span class="day-header-label">${day.label}</span>
    <span class="day-header-sub">${day.date}</span>
  `;
  timeline.appendChild(header);

  // Timeline line
  const line = document.createElement('div');
  line.className = 'timeline-line';
  timeline.appendChild(line);

  day.activities.forEach((act, i) => {
    const key = `${dayIdx}-${i}`;
    const isDone = !!doneState[key];
    const isSaved = !!savedState[key];
    const st = statusMap[act.status];

    const row = document.createElement('div');
    row.className = 'activity-row';

    row.innerHTML = `
      <div class="time-col">
        <span class="time-text">${act.time}</span>
        <div class="timeline-dot"></div>
      </div>
      <div class="card-relative-wrap">
        <div class="activity-card ${isDone ? 'done-card' : ''}" data-key="${key}">
          <div class="card-top">
            <div class="card-thumb">
              <div class="card-thumb-placeholder">${act.emoji}</div>
            </div>
            <div class="card-body">
              <div class="card-header-row">
                <span class="activity-name">${act.name}</span>
                <span class="card-category">${act.category}</span>
              </div>
              <p class="activity-desc">${act.desc}</p>
            </div>
          </div>
          <div class="card-actions">
            <span class="badge ${st.cls}">${st.icon} ${st.label}</span>
            <button class="btn-map" data-place="${act.name}">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="10" r="4" stroke="currentColor" stroke-width="2"/>
                <path d="M12 2C7.03 2 3 6.03 3 11c0 6.25 9 13 9 13s9-6.75 9-13c0-4.97-4.03-9-9-9z" stroke="currentColor" stroke-width="2" fill="none"/>
              </svg>
              Ver en mapa
            </button>
            <button class="btn-bookmark ${isSaved ? 'saved' : ''}" data-key="${key}" title="Guardar">
              ${isSaved ? '🔖' : '📌'}
            </button>
          </div>
        </div>
        <button class="done-toggle ${isDone ? 'checked' : ''}" data-key="${key}" title="Marcar como hecho">
          ${isDone ? '✓' : ''}
        </button>
      </div>
    `;

    timeline.appendChild(row);
  });

  // Fade-in animation
  timeline.classList.remove('day-transition');
  void timeline.offsetWidth;
  timeline.classList.add('day-transition');
}

/* ── EVENTS ─────────────────────────────────────────────── */
// Day selector
document.getElementById('daySelector').addEventListener('click', e => {
  const pill = e.target.closest('.day-pill');
  if (!pill) return;
  const idx = parseInt(pill.dataset.day);
  currentDay = idx;
  document.querySelectorAll('.day-pill').forEach((p, i) => {
    p.classList.toggle('active', i === idx);
  });
  renderDay(idx);
  document.getElementById('timelineWrap').scrollTop = 0;
});

// Scroll next
document.getElementById('scrollNextBtn').addEventListener('click', () => {
  document.getElementById('daySelector').scrollBy({ left: 120, behavior: 'smooth' });
});

// Timeline interactions (delegated)
document.getElementById('timeline').addEventListener('click', e => {
  // Done toggle
  const doneBtn = e.target.closest('.done-toggle');
  if (doneBtn) {
    const key = doneBtn.dataset.key;
    doneState[key] = !doneState[key];
    localStorage.setItem('asia-done', JSON.stringify(doneState));
    doneBtn.classList.toggle('checked', doneState[key]);
    doneBtn.textContent = doneState[key] ? '✓' : '';
    const card = document.querySelector(`.activity-card[data-key="${key}"]`);
    if (card) card.classList.toggle('done-card', doneState[key]);
    return;
  }

  // Bookmark
  const bkBtn = e.target.closest('.btn-bookmark');
  if (bkBtn) {
    const key = bkBtn.dataset.key;
    savedState[key] = !savedState[key];
    localStorage.setItem('asia-saved', JSON.stringify(savedState));
    bkBtn.classList.toggle('saved', savedState[key]);
    bkBtn.textContent = savedState[key] ? '🔖' : '📌';
    showToast(savedState[key] ? '🔖 Guardado en notas' : '📌 Eliminado de notas');
    return;
  }

  // Map button
  const mapBtn = e.target.closest('.btn-map');
  if (mapBtn) {
    const place = mapBtn.dataset.place;
    const query = encodeURIComponent(place + ', ' + DAYS[currentDay].label.split('–')[1]?.trim());
    showToast('📍 Abriendo ' + place + '…');
    setTimeout(() => {
      window.open(`https://maps.google.com/?q=${query}`, '_blank');
    }, 600);
    return;
  }
});

// Nav
document.getElementById('bottomNav').addEventListener('click', e => {
  const item = e.target.closest('.nav-item');
  if (!item) return;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  item.classList.add('active');
  const nav = item.dataset.nav;
  if (nav !== 'itinerary') showToast('🚧 Sección "' + item.querySelector('.nav-label').textContent + '" próximamente');
});

/* ── TOAST ─────────────────────────────────────────────── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── PETALS ─────────────────────────────────────────────── */
function createPetals() {
  const container = document.getElementById('petals');
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 5 + Math.random() * 7;
    p.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${4 + Math.random() * 6}s;
      animation-delay: ${Math.random() * 8}s;
      opacity: ${0.4 + Math.random() * 0.4};
    `;
    // Alternate petal colors
    if (Math.random() > 0.5) {
      p.style.background = 'radial-gradient(ellipse, #f8e0e8 30%, #f4c8d4 100%)';
    }
    container.appendChild(p);
  }
}

/* ── INIT ─────────────────────────────────────────────── */
createPetals();
renderDay(0);
</script>
